<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#c9a84c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>MOANA Spa Music</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;--gold-light:#e8d48b;--gold-dark:#a08030;
  --bg-dark:#1a1a2e;--bg-card:#16213e;--bg-surface:#0f3460;
  --text-light:#e8e8e8;--text-muted:#a0a0b0;
}
body{font-family:'Montserrat',sans-serif;background:var(--bg-dark);color:var(--text-light);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(15,52,96,.3) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(201,168,76,.05) 0%,transparent 50%);z-index:0;animation:bgPulse 8s ease-in-out infinite alternate}
@keyframes bgPulse{0%{opacity:.7}100%{opacity:1}}
.container{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{text-align:center;padding:24px 0 12px}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;color:var(--gold);letter-spacing:8px;text-transform:uppercase;text-shadow:0 0 30px rgba(201,168,76,.3)}
.logo-sub{font-size:11px;letter-spacing:6px;color:var(--gold-light);text-transform:uppercase;margin-top:2px;font-weight:300;opacity:.7}
.divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px auto}

/* Status bar */
.status-bar{display:flex;justify-content:center;gap:20px;margin-bottom:16px;font-size:11px;color:var(--text-muted);letter-spacing:1px}
.status-bar span{display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block}
.dot.off{background:#555}

/* Now Playing */
.now-playing{background:linear-gradient(135deg,var(--bg-card),var(--bg-surface));border:1px solid rgba(201,168,76,.15);border-radius:20px;padding:24px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.now-playing::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(201,168,76,.03) 0%,transparent 70%);animation:rotate 20s linear infinite}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.disc{width:120px;height:120px;border-radius:50%;background:conic-gradient(from 0deg,var(--bg-dark),var(--bg-card),var(--bg-dark),var(--bg-card),var(--bg-dark));margin:0 auto 16px;position:relative;border:2px solid rgba(201,168,76,.3);z-index:1}
.disc.spinning{animation:spin 4s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.disc::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;background:var(--gold);border-radius:50%;box-shadow:0 0 15px rgba(201,168,76,.5)}

.track-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--gold-light);margin-bottom:2px;z-index:1;position:relative}
.track-artist{font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;z-index:1;position:relative}

/* Progress */
.progress-container{margin:16px 0 8px;z-index:1;position:relative}
.progress-bar{width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold-light));border-radius:2px;width:0%;transition:width .3s linear;position:relative}
.progress-fill::after{content:'';position:absolute;right:-5px;top:-3px;width:10px;height:10px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px rgba(201,168,76,.6)}
.time-display{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:4px}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:24px;margin:8px 0;z-index:1;position:relative}
.btn{background:none;border:none;cursor:pointer;color:var(--text-light);transition:all .2s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.9)}
.btn-skip{width:44px;height:44px;opacity:.7}
.btn-skip:hover,.btn-skip:active{opacity:1}
.btn-play{width:72px;height:72px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;box-shadow:0 4px 20px rgba(201,168,76,.3)}
.btn-play:hover{box-shadow:0 4px 30px rgba(201,168,76,.5)}
.btn-play svg{color:var(--bg-dark)}

/* Volume */
.volume-section{display:flex;align-items:center;gap:12px;padding:0 16px;margin:8px 0;z-index:1;position:relative}
.volume-icon{opacity:.6;flex-shrink:0}
.volume-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--gold);border-radius:50%;cursor:pointer;box-shadow:0 0 8px rgba(201,168,76,.4)}

/* Crossfade slider */
.crossfade-section{display:flex;align-items:center;justify-content:center;gap:8px;font-size:10px;color:var(--text-muted);letter-spacing:1px;margin:4px 0;z-index:1;position:relative}
.crossfade-section input{width:80px;-webkit-appearance:none;appearance:none;height:3px;background:rgba(255,255,255,.08);border-radius:2px;outline:none}
.crossfade-section input::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--gold-dark);border-radius:50%;cursor:pointer}

/* Playlist */
.playlist-section{flex:1;margin-top:12px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 4px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
.track-count{font-size:10px;color:var(--text-muted);letter-spacing:1px}
.playlist{list-style:none;display:flex;flex-direction:column;gap:4px;padding-bottom:80px}
.playlist-item{display:flex;align-items:center;padding:12px 14px;background:rgba(22,33,62,.6);border:1px solid rgba(201,168,76,.06);border-radius:10px;cursor:pointer;transition:all .2s;gap:12px;-webkit-tap-highlight-color:transparent}
.playlist-item:active,.playlist-item.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3)}
.playlist-item.active .item-title{color:var(--gold-light)}
.item-num{font-size:11px;color:var(--text-muted);min-width:22px;text-align:center}
.playlist-item.active .item-num{color:var(--gold)}
.item-info{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-artist{font-size:10px;color:var(--text-muted)}
.item-duration{font-size:10px;color:var(--text-muted)}
.eq-bars{display:flex;align-items:flex-end;gap:2px;height:14px;min-width:18px}
.eq-bar{width:3px;background:var(--gold);border-radius:1px;animation:eqBounce .8s ease-in-out infinite alternate}
.eq-bar:nth-child(1){height:5px;animation-delay:0s}
.eq-bar:nth-child(2){height:10px;animation-delay:.2s}
.eq-bar:nth-child(3){height:7px;animation-delay:.4s}
@keyframes eqBounce{0%{transform:scaleY(.3)}100%{transform:scaleY(1)}}

/* Big play overlay (first launch) */
.start-overlay{position:fixed;inset:0;background:rgba(26,26,46,.95);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.start-overlay.hidden{display:none}
.start-btn{width:120px;height:120px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(201,168,76,.3);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(201,168,76,.3)}50%{box-shadow:0 0 80px rgba(201,168,76,.5)}}
.start-label{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold-light);letter-spacing:4px;text-transform:uppercase}
.start-sub{font-size:11px;color:var(--text-muted);letter-spacing:1px}

/* Footer */
.footer{text-align:center;padding:16px 0;font-size:9px;color:var(--text-muted);letter-spacing:2px;opacity:.4}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-card);border:1px solid rgba(201,168,76,.3);color:var(--gold-light);padding:10px 24px;border-radius:30px;font-size:12px;letter-spacing:1px;z-index:100;transition:transform .3s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>

// ================================================================
// CROSSFADE ENGINE — 2 audio elements, fondu enchaîné
// ================================================================

const audioA = new Audio();
const audioB = new Audio();
audioA.preload = 'auto';
audioB.preload = 'auto';

let activeAudio = audioA;
let nextAudio = audioB;
let currentIndex = 0;
let isPlaying = false;
let crossfadeDuration = 3; // secondes
let crossfading = false;
let loopCount = 1;
let masterVolume = 0.6;
let crossfadeTimer = null;

const disc = document.getElementById('disc');
const trackTitle = document.getElementById('trackTitle');
const trackArtist = document.getElementById('trackArtist');
const btnPlay = document.getElementById('btnPlay');
const playIcon = document.getElementById('playIcon');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');
const volumeSlider = document.getElementById('volumeSlider');
const crossfadeSlider = document.getElementById('crossfadeSlider');
const crossfadeVal = document.getElementById('crossfadeVal');
const playlistEl = document.getElementById('playlist');
const toastEl = document.getElementById('toast');
const startOverlay = document.getElementById('startOverlay');
const loopCounter = document.getElementById('loopCounter');
const dotCrossfade = document.getElementById('dotCrossfade');
const trackCount = document.getElementById('trackCount');

// ================================================================
// PLAYLIST UI
// ================================================================

function buildPlaylist() {
  playlistEl.innerHTML = '';
  TRACKS.forEach((track, i) => {
    const li = document.createElement('li');
    li.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
    li.innerHTML = `
      <span class="item-num">${i === currentIndex && isPlaying ?
        '<span class="eq-bars"><span class="eq-bar"></span><span class="eq-bar"></span><span class="eq-bar"></span></span>' :
        String(i + 1).padStart(2, '0')}</span>
      <div class="item-info">
        <div class="item-title">${track.title}</div>
        <div class="item-artist">${track.artist}</div>
      </div>
      <span class="item-duration">${track.duration}</span>`;
    li.addEventListener('click', () => { currentIndex = i; loadAndPlay(); });
    playlistEl.appendChild(li);
  });
  trackCount.textContent = TRACKS.length + ' morceaux';
}

function updateUI() {
  const track = TRACKS[currentIndex];
  trackTitle.textContent = track.title;
  trackArtist.textContent = track.artist;
  buildPlaylist();
  updateMediaSession();
}

function updatePlayButton() {
  playIcon.innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
  disc.classList.toggle('spinning', isPlaying);
}

// ================================================================
// CROSSFADE LOGIC
// ================================================================

function loadTrack(audio, index) {
  audio.src = TRACKS[index].src;
  audio.volume = 0;
  audio.load();
}

function startCrossfade() {
  if (crossfading) return;
  crossfading = true;

  const nextIndex = (currentIndex + 1) % TRACKS.length;

  // Détection boucle complète
  if (nextIndex === 0) {
    loopCount++;
    loopCounter.textContent = 'Boucle ' + loopCount;
  }

  // Préparer le prochain morceau
  loadTrack(nextAudio, nextIndex);

  const fadeSteps = 30;
  const stepTime = (crossfadeDuration * 1000) / fadeSteps;
  let step = 0;

  // Démarrer le prochain morceau
  nextAudio.play().catch(() => {});

  const fadeInterval = setInterval(() => {
    step++;
    const progress = step / fadeSteps;

    // Fade out actif, fade in prochain
    activeAudio.volume = Math.max(0, masterVolume * (1 - progress));
    nextAudio.volume = Math.min(masterVolume, masterVolume * progress);

    if (step >= fadeSteps) {
      clearInterval(fadeInterval);
      activeAudio.pause();
      activeAudio.currentTime = 0;

      // Swap
      const tmp = activeAudio;
      activeAudio = nextAudio;
      nextAudio = tmp;
      currentIndex = nextIndex;
      crossfading = false;
      updateUI();

      // Précharger le suivant
      preloadNext();
    }
  }, stepTime);
}

function preloadNext() {
  const nextIndex = (currentIndex + 1) % TRACKS.length;
  nextAudio.src = TRACKS[nextIndex].src;
  nextAudio.preload = 'auto';
  nextAudio.load();
}

// Surveiller la fin du morceau pour déclencher le crossfade
function checkCrossfade() {
  if (!isPlaying || crossfading) return;
  const remaining = activeAudio.duration - activeAudio.currentTime;
  if (remaining <= crossfadeDuration && remaining > 0 && activeAudio.duration > 0) {
    startCrossfade();
  }
}

// ================================================================
// PLAYER CONTROLS
// ================================================================

function loadAndPlay() {
  if (crossfading) return;

  // Stop tout
  audioA.pause(); audioB.pause();
  activeAudio = audioA; nextAudio = audioB;

  activeAudio.src = TRACKS[currentIndex].src;
  activeAudio.volume = masterVolume;

  activeAudio.play().then(() => {
    isPlaying = true;
    updatePlayButton();
    updateUI();
    preloadNext();
  }).catch(() => {
    showToast('⚠ Fichier introuvable : ' + TRACKS[currentIndex].src);
    // Passer au suivant après 2s
    setTimeout(() => {
      currentIndex = (currentIndex + 1) % TRACKS.length;
      loadAndPlay();
    }, 2000);
  });
}

function togglePlay() {
  if (!isPlaying) {
    if (!activeAudio.src || activeAudio.src === location.href) {
      loadAndPlay();
    } else {
      activeAudio.play().then(() => {
        isPlaying = true;
        updatePlayButton();
        buildPlaylist();
      });
    }
  } else {
    activeAudio.pause();
    if (crossfading) nextAudio.pause();
    isPlaying = false;
    updatePlayButton();
    buildPlaylist();
  }
}

function nextTrack() {
  currentIndex = (currentIndex + 1) % TRACKS.length;
  if (currentIndex === 0) { loopCount++; loopCounter.textContent = 'Boucle ' + loopCount; }
  loadAndPlay();
}

function prevTrack() {
  if (activeAudio.currentTime > 3) {
    activeAudio.currentTime = 0;
    return;
  }
  currentIndex = (currentIndex - 1 + TRACKS.length) % TRACKS.length;
  loadAndPlay();
}

function formatTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// ================================================================
// EVENT LISTENERS
// ================================================================

document.getElementById('btnPlay').addEventListener('click', togglePlay);
document.getElementById('btnNext').addEventListener('click', nextTrack);
document.getElementById('btnPrev').addEventListener('click', prevTrack);

volumeSlider.addEventListener('input', (e) => {
  masterVolume = e.target.value / 100;
  activeAudio.volume = masterVolume;
});

crossfadeSlider.addEventListener('input', (e) => {
  crossfadeDuration = parseInt(e.target.value);
  crossfadeVal.textContent = crossfadeDuration + 's';
  dotCrossfade.classList.toggle('off', crossfadeDuration === 0);
});

progressBar.addEventListener('click', (e) => {
  if (activeAudio.duration) {
    const rect = progressBar.getBoundingClientRect();
    activeAudio.currentTime = ((e.clientX - rect.left) / rect.width) * activeAudio.duration;
  }
});

// Update loop — progress + crossfade check
setInterval(() => {
  if (isPlaying && activeAudio.duration) {
    progressFill.style.width = (activeAudio.currentTime / activeAudio.duration * 100) + '%';
    currentTimeEl.textContent = formatTime(activeAudio.currentTime);
    totalTimeEl.textContent = formatTime(activeAudio.duration);
    checkCrossfade();
  }
}, 250);

// Fallback si crossfade raté — enchaîner quand même
audioA.addEventListener('ended', () => { if (!crossfading && isPlaying) nextTrack(); });
audioB.addEventListener('ended', () => { if (!crossfading && isPlaying) nextTrack(); });

// Erreurs — skip automatique
audioA.addEventListener('error', () => { if (isPlaying) { showToast('⚠ Skip...'); setTimeout(nextTrack, 1000); }});
audioB.addEventListener('error', () => { if (isPlaying) { showToast('⚠ Skip...'); setTimeout(nextTrack, 1000); }});

// ================================================================
// MEDIA SESSION API — Contrôles notification Android
// ================================================================

function updateMediaSession() {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: TRACKS[currentIndex].title,
      artist: TRACKS[currentIndex].artist,
      album: 'MOANA Spa Music',
      artwork: [
        { src: 'icon-192.png', sizes: '192x192', type: 'image/png' },
        { src: 'icon-512.png', sizes: '512x512', type: 'image/png' }
      ]
    });
    navigator.mediaSession.setActionHandler('play', togglePlay);
    navigator.mediaSession.setActionHandler('pause', togglePlay);
    navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
    navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
  }
}

// ================================================================
// WAKE LOCK — Empêcher mise en veille
// ================================================================

let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && isPlaying) requestWakeLock();
});

// ================================================================
// SERVICE WORKER
// ================================================================

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ================================================================
// START OVERLAY — 1 tap et c'est parti pour 12h
// ================================================================

startOverlay.addEventListener('click', () => {
  startOverlay.classList.add('hidden');
  requestWakeLock();
  loadAndPlay();
  showToast('🎵 Musique spa lancée — boucle infinie');
});

// ================================================================
// INIT
// ================================================================

buildPlaylist();
dotCrossfade.classList.remove('off'); // crossfade ON par défaut
</script>
